name: "Changelog: Send discord webhook"

on:
  pull_request_target:
    types: [closed]

jobs:
  send-discord:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract PR details
        id: extract
        run: |
          BODY=$(printf '%s' "${{ github.event.pull_request.body }}" | base64 -w0)
          echo "DESCRIPTION_B64=$BODY" >> $GITHUB_OUTPUT
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "AUTHOR=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
          echo "REPO=${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Check conditions and Parse PR
        id: parse_step
        env:
          DESCRIPTION_B64: ${{ steps.extract.outputs.DESCRIPTION_B64 }}
          PR_NUMBER: ${{ steps.extract.outputs.PR_NUMBER }}
          AUTHOR: ${{ steps.extract.outputs.AUTHOR }}
          REPO: ${{ steps.extract.outputs.REPO }}
        run: |
          python <<'EOF'
          import re, os, base64

          desc_b64 = os.environ.get("DESCRIPTION_B64", "")
          desc = base64.b64decode(desc_b64).decode("utf-8", errors="replace")

          desc_clean = re.sub(r'<!--.*?-->', '', desc, flags=re.DOTALL)

          if ":cl:" not in desc_clean or ":v:" not in desc_clean:
              print("Пропуск: нет :cl: или :v:")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("should_send=false\n")
              exit(0)

          sections = {
              "Добавлено": "🆕 **Добавлено:**",
              "Удалено": "❌ **Удалено:**",
              "Изменено": "⚒️ **Изменено:**",
              "Исправлено": "🐛 **Исправлено:**",
          }

          content_parts = [f"**Изменение (PR #{os.environ['PR_NUMBER']})**"]

          found_any = False
          for title, display_name in sections.items():
              pattern = rf"- {title}:\s*(.*?)(?=\n- [^:]|$)"
              match = re.search(pattern, desc_clean, flags=re.DOTALL)
              if match:
                  val = match.group(1).strip()
                  if val:
                      content_parts.append(f"{display_name}\n{val}")
                      found_any = True

          if not found_any:
              print("Изменения не найдены внутри секций")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("should_send=false\n")
              exit(0)

          content_parts.append(f"👤 **Автор:** {os.environ['AUTHOR']}")
          content_parts.append(f"🔗 <https://github.com{os.environ['REPO']}/pull/{os.environ['PR_NUMBER']}>")

          full_message = "\n\n".join(content_parts)

          with open("discord_msg.txt", "w", encoding="utf-8") as f:
              f.write(full_message)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("should_send=true\n")
          EOF

      - name: Send to Discord
        if: steps.parse_step.outputs.should_send == 'true'
        env:
          WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
        run: |
          MESSAGE_TEXT=$(cat discord_msg.txt)

          jq -n --arg msg "$MESSAGE_TEXT" '{
            "username": "Союз-1",
            "content": $msg
          }' | curl -X POST \
            -H "Content-Type: application/json" \
            -d @- \
            "$WEBHOOK_URL" \
            --fail \
            --silent
